#   [stmux] static code analysis (linting)
lint
    eslint --config etc/eslint.mjs src

#   [stmux] static code analysis (linting) with file watching
lint-watch
    nodemon --exec "stx lint" --watch src --ext ts,pegjs

#   [stmux] code compilation/transpiling (building)
build : lint
    peggy --format es --allowed-start-rules split --dts \
        -o src/stmux-2-parser.gen.js src/stmux-2-parser.pegjs
    tsc --project etc/tsconfig.json
    shx cp src/stmux-2-parser.gen.js dst/stmux-2-parser.gen.js
    shx chmod a+x dst/stmux.js

#   [stmux] code compilation/transpiling (building) with file watching
build-watch : build
    nodemon --exec "stx build" --watch src --ext ts,pegjs

#   [stmux] run program
test : build
    node -- ./dst/stmux.js -n -w error -e "ERROR,!style errors" -m beep,system -- \
        [ -s 2/3 [ -s 60% -e foo -t shell $SHELL .. 'date; true' ] : 'date; true' ]

#   [stmux] remove all files regularly generated
clean
    shx rm -rf dst
    shx rm -f src/stmux-2-parser.gen.js src/stmux-2-parser.gen.d.ts

#   [stmux] remove all files generated
clean-dist : clean
    shx rm -f package-lock.json
    shx rm -rf node_modules

